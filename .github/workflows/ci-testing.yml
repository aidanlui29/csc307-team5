name: CI Testing

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install dependencies (clean install)
      - run: npm ci

      # Build (only frontend needs building)
      - run: npm run -w react-frontend build

      # Lint (code style checks)
      - run: npm run -w express-backend lint
      - run: npm run -w react-frontend lint

      # Tests
      - run: npm run -w express-backend test
      - run: npm run -w react-frontend test